<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ project().title }}</mat-card-title>
  </mat-card-header>
  <img mat-card-image src="{{ project().imageLink }}" alt="project-image">
  <mat-card-content>
    <p>{{ project().description }}</p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button (click)="projectLink()">Link to the Project</button>
  </mat-card-actions>
</mat-card>
